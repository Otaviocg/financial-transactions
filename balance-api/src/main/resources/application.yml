spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/financial_transactions
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          time_zone: America/Sao_Paulo

server:
  port: 8080

logging:
  level:
    root: INFO
    com.financial.balanceapi: DEBUG
    org.hibernate.SQL: WARN

