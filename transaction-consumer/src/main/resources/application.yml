spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/financial_transactions
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 4
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  jackson:
    property-naming-strategy: SNAKE_CASE
    deserialization:
      use-big-decimal-for-floats: true

  main:
    web-application-type: none

# ---------------------------------------------------------------------------
# AWS / LocalStack
# ---------------------------------------------------------------------------
aws:
  endpoint: http://localstack:4566
  region: sa-east-1
  access-key: test
  secret-key: test

# ---------------------------------------------------------------------------
# SQS consumer settings
# ---------------------------------------------------------------------------
sqs:
  queue-url: http://localstack:4566/000000000000/transacoes-financeiras-processadas
  consumer-threads: 4
  max-messages: 10
  wait-time-seconds: 20
  enabled: true

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging:
  level:
    root: INFO
    com.financial.transactionconsumer: INFO
    org.hibernate.SQL: WARN

